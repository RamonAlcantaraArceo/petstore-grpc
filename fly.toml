# Fly.io configuration — single container running the gRPC server and Envoy.
#
# Deploy:
#   fly deploy
#
# Inject build metadata at deploy time:
#   fly deploy \
#     --build-arg BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
#     --build-arg GIT_COMMIT_SHA=$(git rev-parse HEAD)

app = "petstore-grpc"
primary_region = "iad"

[build]

[env]
  MODE = "prod"
  PORT = "50051"

# Native gRPC clients (grpcurl, mobile, server-to-server)
[[services]]
  protocol = "tcp"
  internal_port = 50051

  [[services.ports]]
    port = 50051
    handlers = ["tls"]

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"
    restart_limit = 0

# Browser gRPC-Web clients via Envoy
[[services]]
  protocol = "tcp"
  internal_port = 8080

  [[services.ports]]
    port = 443
    handlers = ["tls"]

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"
    restart_limit = 0
