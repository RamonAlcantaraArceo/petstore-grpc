site_name: Petstore gRPC
site_description: Python gRPC service for pet store operations
site_author: Ramon Alcantara Arceo
repo_url: https://github.com/RamonAlcantaraArceo/petstore-grpc
repo_name: RamonAlcantaraArceo/petstore-grpc

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - include-markdown

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Running the Server: running-the-server.md
  - Running the Tests: running-the-tests.md
  - Architecture: architecture.md
  - gRPC Client:
    - Health Check: gRPC_client/health.md
