app = "petstore-grpc-staging"
primary_region = "iad"

[build]
image = "ghcr.io/ramonalcantaraarceo/petstore-grpc:latest"

[deploy]
strategy = "immediate"

[env]
APP_ENV = "staging"
LOG_LEVEL = "INFO"
STORAGE_MODE = "cloud"

[http_service]
auto_start_machines = true
auto_stop_machines = true
force_https = true
internal_port = 8_080
min_machines_running = 0
processes = [ "app" ]

[http_service.http_options]
h2_backend = true

[[vm]]
cpu_kind = "shared"
cpus = 1
memory = "1gb"
memory_mb = 256
