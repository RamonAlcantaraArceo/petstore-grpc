services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: petstore
      POSTGRES_USER: petstore
      POSTGRES_PASSWORD: petstore
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petstore -d petstore"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  petstore-grpc:
    build:
      context: .
      args:
        BUILD_DATE: "${BUILD_DATE:-unknown}"
        GIT_COMMIT_SHA: "${GIT_COMMIT_SHA:-unknown}"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${HOST_GRPC_PORT:-50051}:50051" # native gRPC
      - "${HOST_GRPC_WEB_PORT:-8080}:8080" # gRPC-Web via Envoy
      - "${HOST_ENVOY_ADMIN_PORT:-9901}:9901" # Envoy admin UI
    environment:
      PORT: 50051
      STORAGE_MODE: "${STORAGE_MODE:-postgres}"
      version: "0.0.0-local"
      BUILD_DATE: ${BUILD_DATE:-today}
      GIT_COMMIT_SHA: ${GIT_COMMIT_SHA:-dead-beef}
      DATABASE_URL: "${DATABASE_URL:-postgresql+asyncpg://petstore:petstore@postgres:5432/petstore}"
      DATABASE_POOLER_URL: "${DATABASE_POOLER_URL:-postgresql+asyncpg://petstore:petstore@postgres:5432/petstore}"
      SEED_DATASET: "${SEED_DATASET:-mixed_v2}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      ENVOY_LOG_LEVEL: "${ENVOY_LOG_LEVEL:-info}"
    restart: unless-stopped
